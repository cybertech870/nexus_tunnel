<script>
    // Supabase Credentials
    const supabaseUrl = "https://pgmtgecradinyqfrmsvx.supabase.co";
    const supabaseKey = "sb_publishable__UW4kkCOKGW3xd_ZW64jdQ_DElwrDo-";
    
    // Initialize Client
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    async function loadConfigs() {
        const container = document.getElementById('config-container');
        
        try {
            // Fetch tanang rows sa 'configs' table
            const { data, error } = await supabaseClient.from('configs').select("*");
            
            if (error) {
                console.error("DB Error:", error.message);
                container.innerHTML = '<p style="color:#ff4444;">Database Error. Check connection.</p>';
                return;
            }

            if (!data || data.length === 0) {
                container.innerHTML = '<div class="status-msg">No configs available yet. Update soon!</div>';
                return;
            }

            container.innerHTML = ''; // Clear loading text
            
            data.forEach(config => {
                const card = document.createElement('div');
                card.className = 'config-card';
                
                // Logic para sa Description (Network info)
                const descText = config.description ? config.description : "MULTI-NETWORK / FAST CONNECT";
                 const dateUploaded = config.created_at ? new Date(config.created_at).toLocaleString('en-PH', { 
               month: 'short', 
               day: 'numeric', 
                hour: '2-digit', 
               minute: '2-digit' 
               }) : 'Just now';

                card.innerHTML = `
                    <div class="info">
                        <span class="name">${config.name}</span>
                        <span class="description">${descText}</span>
                        <span style="color: #00ff00; font-size: 10px; display: block; margin-top: 5px;">📅 ${dateUploaded}</span>
                    </div>
                    
                    <button class="get-btn">Get Config</button>
                `;

                // --- 💸 CLICK EVENT WITH ADS TRIGGER ---
                card.querySelector('.get-btn').addEventListener('click', () => {
                    
                    // 🔥 MONE-EY MAKER: "KALIT PAKITA" AD (DIRECT LINK)
                    // I-paste imong Adsterra Direct Link sa sulod sa single quotes
                    const adClickLink = 'https://www.profitablecpmratenetwork.com/s97wfwaty?key=5558dc0531de8c54ad979cb36ad3a176';
                    
                    // 1. Mo-abli ang commercial/ad sa bag-ong tab
                    if(adClickLink !== '') {
                        window.open(adClickLink, '_blank');
                    }

                    // 2. I-redirect ang main window sa download.html bitbit ang file info
                    window.location.href = `download.html?file=${encodeURIComponent(config.file_url)}&name=${encodeURIComponent(config.name)}`;
                });

                container.appendChild(card);
            });

        } catch (err) {
            container.innerHTML = '<p style="color:#ff4444;">Network Timeout. Refresh the page.</p>';
        }
    }

    // Run on startup
    loadConfigs();
</script>
